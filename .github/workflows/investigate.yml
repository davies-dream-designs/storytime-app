name: Agent Bug Investigation

on:
  issues:
    types: [labeled]

jobs:
  investigate:
    if: github.event.label.name == 'needs-investigation'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Claude Code
        run: npm install -g @anthropic/claude-code

      - name: Create investigation branch
        id: branch
        run: |
          BRANCH="fix/issue-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Run agent investigation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          claude --print --dangerously-skip-permissions "
          You are investigating a bug in the Storycot codebase (Next.js 15 App Router, Vercel, Clerk auth, Inngest, OpenAI, Vercel Blob, Vercel KV).

          GitHub Issue #${{ github.event.issue.number }}:
          Title: ${{ github.event.issue.title }}
          Body:
          ${{ github.event.issue.body }}

          Your task:
          1. Understand the bug described in the issue
          2. Find the relevant code in the codebase
          3. Identify the root cause
          4. Implement a fix
          5. Make sure tests still pass (run: npm test)

          Guidelines:
          - Only change what's needed to fix the bug
          - Do not add comments explaining what you changed
          - Do not deploy or push anything yourself
          - After fixing, output a short summary of what you found and changed

          Working directory: $(pwd)
          "

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push if changes made
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: agent investigation for issue #${{ github.event.issue.number }}

          Closes #${{ github.event.issue.number }}

          Co-Authored-By: Claude <noreply@anthropic.com>"
          git push origin "${{ steps.branch.outputs.name }}"
          gh pr create \
            --title "fix: issue #${{ github.event.issue.number }} — ${{ github.event.issue.title }}" \
            --body "Automated investigation and fix for #${{ github.event.issue.number }}.

          Agent identified the root cause and applied a fix. Please review before merging.

          Closes #${{ github.event.issue.number }}" \
            --base main \
            --head "${{ steps.branch.outputs.name }}"

      - name: Comment if no changes
        if: steps.changes.outputs.has_changes == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "🤖 Agent investigated this issue but couldn't determine a code fix automatically. Manual review needed."
